<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>微信记账本</title>
    <style>
        :root {
            --primary: #07C160;
            --primary-dark: #06ad56;
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #888888;
            --danger: #FF3B30;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            max-width: 100vw;
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom, 80px);
        }
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 20px 20px 30px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
            border-radius: 0 0 20px 20px;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .header h1 { margin: 0; font-size: 22px; font-weight: 600; }
        .header p { margin: 4px 0 0; font-size: 13px; opacity: 0.9; }
        .stats-btn {
            width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.2);
            border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .date-nav {
            background: rgba(255,255,255,0.15); border-radius: 12px; padding: 10px 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .date-nav-btn { background: none; border: none; color: white; cursor: pointer; padding: 4px; }
        .date-display { font-size: 15px; font-weight: 500; min-width: 70px; text-align: center; }
        .today-btn {
            background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px;
            border-radius: 15px; font-size: 12px; cursor: pointer;
        }
        .summary-card {
            background: var(--card); margin: -16px 16px 16px; border-radius: 14px;
            padding: 16px; box-shadow: var(--shadow); position: relative; z-index: 5;
        }
        .summary-row { display: flex; justify-content: space-between; align-items: baseline; }
        .summary-label { font-size: 14px; color: var(--text-secondary); }
        .summary-amount { font-size: 26px; font-weight: 700; color: var(--danger); }
        .summary-count { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        
        .list-container { padding: 0 16px 100px; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .empty-icon { width: 48px; height: 48px; margin: 0 auto 12px; opacity: 0.3; }
        .record-card {
            background: var(--card); border-radius: 14px; padding: 14px; margin-bottom: 10px;
            display: flex; align-items: center; box-shadow: var(--shadow); transition: transform 0.2s;
        }
        .record-card:active { transform: scale(0.98); }
        .cat-icon {
            width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center;
            justify-content: center; margin-right: 12px; flex-shrink: 0; font-size: 20px;
        }
        .record-info { flex: 1; min-width: 0; }
        .record-cat { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
        .record-note { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .record-right { text-align: right; flex-shrink: 0; }
        .record-amount { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
        .record-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .action-btn {
            background: none; border: none; padding: 4px; cursor: pointer; color: var(--text-secondary);
            font-size: 14px;
        }
        
        .fab {
            position: fixed; bottom: 90px; right: 20px; width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%; border: none; color: white; font-size: 28px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 16px rgba(7, 193, 96, 0.4); cursor: pointer; z-index: 50;
        }
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--card);
            border-top: 1px solid #eee; display: flex; justify-content: space-around;
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); z-index: 40;
        }
        .tab-item {
            background: none; border: none; display: flex; flex-direction: column; align-items: center;
            gap: 4px; padding: 4px 16px; cursor: pointer; color: var(--text-secondary);
        }
        .tab-item.active { color: var(--primary); }
        .tab-icon { width: 22px; height: 22px; }
        
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100;
            display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-content {
            width: 100%; max-width: 450px; background: var(--card); border-radius: 20px 20px 0 0;
            padding: 20px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            max-height: 85vh; overflow-y: auto;
        }
        .modal-overlay.open .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 18px; font-weight: 600; margin: 0; }
        .close-btn { background: none; border: none; font-size: 24px; color: var(--text-secondary); cursor: pointer; padding: 4px; }
        
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
        .amount-input-wrap {
            display: flex; align-items: center; background: #f8f8f8; border-radius: 12px; padding: 12px 14px;
        }
        .currency { font-size: 22px; color: var(--text); margin-right: 6px; }
        .amount-input {
            flex: 1; border: none; background: none; font-size: 26px; font-weight: 600; color: var(--text); outline: none;
        }
        .cat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .cat-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 4px;
            border-radius: 10px; border: 2px solid transparent; background: #f8f8f8; cursor: pointer;
        }
        .cat-item.active { border-color: var(--primary); background: rgba(7, 193, 96, 0.08); }
        .cat-item-icon { font-size: 20px; }
        .cat-item-name { font-size: 11px; color: var(--text-secondary); }
        .cat-item.active .cat-item-name { color: var(--primary); font-weight: 500; }
        
        .input-field {
            width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid #eee;
            background: #f8f8f8; font-size: 14px; outline: none; transition: border 0.2s;
        }
        .input-field:focus { border-color: var(--primary); background: white; }
        
        .submit-btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px;
        }
        .submit-btn:active { opacity: 0.9; }
        
        .stats-panel { background: var(--card); margin: 0 16px 16px; border-radius: 14px; padding: 16px; box-shadow: var(--shadow); display: none; }
        .stats-panel.open { display: block; }
        .stats-title { font-size: 16px; font-weight: 600; margin: 0 0 12px; display: flex; align-items: center; gap: 6px; }
        .chart-container { height: 180px; margin-bottom: 16px; position: relative; }
        .pie-legend { display: flex; flex-wrap: wrap; gap: 8px; }
        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-secondary); }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
        
        /* SVG Chart Fallback */
        .donut-chart { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div>
                <h1>微信记账</h1>
                <p>记录每一笔消费</p>
            </div>
            <button class="stats-btn" id="statsToggle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            </button>
        </div>
        <div class="date-nav">
            <button class="date-nav-btn" id="prevDay">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <span class="date-display" id="dateDisplay">今天</span>
            <button class="date-nav-btn" id="nextDay">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
            <button class="today-btn" id="todayBtn">今天</button>
        </div>
    </div>

    <div class="stats-panel" id="statsPanel">
        <div class="stats-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
            消费统计
        </div>
        <div class="chart-container" id="chartContainer">
            <svg class="donut-chart" viewBox="0 0 100 100" id="donutSvg"></svg>
        </div>
        <div class="pie-legend" id="pieLegend"></div>
    </div>

    <div class="summary-card">
        <div class="summary-row">
            <span class="summary-label">今日支出</span>
            <span class="summary-amount" id="dailyTotal">¥0.00</span>
        </div>
        <div class="summary-count" id="dailyCount">共 0 笔记录</div>
    </div>

    <div class="list-container" id="recordList"></div>

    <button class="fab" id="addBtn">+</button>

    <div class="tab-bar">
        <button class="tab-item active" id="tabRecords">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            <span>记录</span>
        </button>
        <button class="tab-item" id="tabStats">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            <span>统计</span>
        </button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">添加记录</h3>
                <button class="close-btn" id="closeModal">×</button>
            </div>
            
            <div class="form-group">
                <label class="form-label">金额</label>
                <div class="amount-input-wrap">
                    <span class="currency">¥</span>
                    <input type="number" class="amount-input" id="amountInput" placeholder="0.00" step="0.01">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">分类</label>
                <div class="cat-grid" id="catGrid"></div>
            </div>

            <div class="form-group">
                <label class="form-label">日期</label>
                <input type="date" class="input-field" id="dateInput">
            </div>

            <div class="form-group">
                <label class="form-label">备注（可选）</label>
                <input type="text" class="input-field" id="noteInput" placeholder="添加备注...">
            </div>

            <button class="submit-btn" id="submitBtn">保存记录</button>
        </div>
    </div>

    <script>
        // 配置
        const CATEGORIES = [
            { id: 'food', name: '餐饮', icon: '🍜', color: '#FF6B6B' },
            { id: 'shopping', name: '购物', icon: '🛍️', color: '#4ECDC4' },
            { id: 'transport', name: '交通', icon: '🚗', color: '#45B7D1' },
            { id: 'entertainment', name: '娱乐', icon: '🎮', color: '#96CEB4' },
            { id: 'housing', name: '住房', icon: '🏠', color: '#FFEAA7' },
            { id: 'education', name: '教育', icon: '📚', color: '#DDA0DD' },
            { id: 'medical', name: '医疗', icon: '💊', color: '#FF69B4' },
            { id: 'clothing', name: '服饰', icon: '👕', color: '#98D8C8' },
            { id: 'travel', name: '旅游', icon: '✈️', color: '#F7DC6F' },
            { id: 'other', name: '其他', icon: '📦', color: '#BDC3C7' }
        ];

        // 状态
        let records = JSON.parse(localStorage.getItem('wx_records') || '[]');
        let viewDate = new Date();
        let editingId = null;
        let selectedCat = 'food';

        // DOM
        const $ = id => document.getElementById(id);
        const dateDisplay = $('dateDisplay');
        const dailyTotalEl = $('dailyTotal');
        const dailyCountEl = $('dailyCount');
        const recordList = $('recordList');
        const modalOverlay = $('modalOverlay');
        const catGrid = $('catGrid');
        const donutSvg = $('donutSvg');
        const pieLegend = $('pieLegend');
        const statsPanel = $('statsPanel');

        // 初始化分类网格
        function initCatGrid() {
            catGrid.innerHTML = CATEGORIES.map(c => `
                <div class="cat-item ${c.id === selectedCat ? 'active' : ''}" data-id="${c.id}">
                    <span class="cat-item-icon">${c.icon}</span>
                    <span class="cat-item-name">${c.name}</span>
                </div>
            `).join('');
            
            catGrid.querySelectorAll('.cat-item').forEach(el => {
                el.addEventListener('click', () => {
                    catGrid.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
                    el.classList.add('active');
                    selectedCat = el.dataset.id;
                });
            });
        }

        // 日期工具
        function formatDateStr(d) {
            const today = new Date(); today.setHours(0,0,0,0);
            const yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
            const check = new Date(d); check.setHours(0,0,0,0);
            if (check.getTime() === today.getTime()) return '今天';
            if (check.getTime() === yesterday.getTime()) return '昨天';
            return `${check.getMonth()+1}月${check.getDate()}日`;
        }
        
        function toISODate(d) { return d.toISOString().split('T')[0]; }

        // 渲染列表
        function render() {
            const dateStr = toISODate(viewDate);
            dateDisplay.textContent = formatDateStr(viewDate);
            
            const dayRecords = records.filter(r => r.date === dateStr).sort((a,b) => b.id - a.id);
            const total = dayRecords.reduce((s,r) => s + r.amount, 0);
            
            dailyTotalEl.textContent = `¥${total.toFixed(2)}`;
            dailyCountEl.textContent = `共 ${dayRecords.length} 笔记录`;
            
            if (dayRecords.length === 0) {
                recordList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📅</div>
                        <p>当天暂无消费记录</p>
                        <p style="font-size:12px;margin-top:4px;opacity:0.7">点击右下角 + 添加</p>
                    </div>`;
                return;
            }
            
            recordList.innerHTML = dayRecords.map(r => {
                const cat = CATEGORIES.find(c => c.id === r.category) || CATEGORIES[9];
                return `
                    <div class="record-card">
                        <div class="cat-icon" style="background:${cat.color}20;color:${cat.color}">${cat.icon}</div>
                        <div class="record-info">
                            <div class="record-cat">${cat.name}</div>
                            ${r.note ? `<div class="record-note">${r.note}</div>` : ''}
                        </div>
                        <div class="record-right">
                            <div class="record-amount" style="color:#333">-¥${r.amount.toFixed(2)}</div>
                            <div class="record-actions">
                                <button class="action-btn edit-btn" data-id="${r.id}">编辑</button>
                                <button class="action-btn del-btn" data-id="${r.id}" style="color:var(--danger)">删除</button>
                            </div>
                        </div>
                    </div>`;
            }).join('');
            
            // 绑定事件
            recordList.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', e => openModal(parseInt(e.target.dataset.id)));
            });
            recordList.querySelectorAll('.del-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    if(confirm('确定删除这条记录吗？')) {
                        records = records.filter(r => r.id !== parseInt(e.target.dataset.id));
                        save(); render(); renderStats();
                    }
                });
            });
        }

        // 统计渲染
        function renderStats() {
            const catMap = {};
            records.forEach(r => { catMap[r.category] = (catMap[r.category]||0) + r.amount; });
            const data = Object.entries(catMap).map(([id, val]) => {
                const c = CATEGORIES.find(x => x.id === id) || CATEGORIES[9];
                return { ...c, value: val };
            }).sort((a,b) => b.value - a.value);
            
            if (data.length === 0) {
                donutSvg.innerHTML = '<text x="50" y="50" text-anchor="middle" fill="#999" font-size="12">暂无数据</text>';
                pieLegend.innerHTML = '';
                return;
            }
            
            const total = data.reduce((s,d) => s + d.value, 0);
            let offset = 0;
            let paths = '';
            data.forEach((d, i) => {
                const pct = d.value / total;
                const dash = `${pct * 314.159} ${314.159}`;
                paths += `<circle cx="50" cy="50" r="40" fill="none" stroke="${d.color}" stroke-width="16" stroke-dasharray="${dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 50 50)" style="transition: all 0.5s"/>`;
                offset += pct * 314.159;
            });
            
            // 中心文字
            paths += `<text x="50" y="46" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">¥${total.toFixed(0)}</text>`;
            paths += `<text x="50" y="62" text-anchor="middle" fill="#888" font-size="10">总支出</text>`;
            donutSvg.innerHTML = paths;
            
            pieLegend.innerHTML = data.map(d => `
                <div class="legend-item">
                    <div class="legend-dot" style="background:${d.color}"></div>
                    <span>${d.name}: ¥${d.value.toFixed(2)} (${((d.value/total)*100).toFixed(0)}%)</span>
                </div>
            `).join('');
        }

        // 弹窗控制
        function openModal(id = null) {
            editingId = id;
            $('modalTitle').textContent = id ? '编辑记录' : '添加记录';
            $('submitBtn').textContent = id ? '保存修改' : '保存记录';
            
            if (id) {
                const r = records.find(x => x.id === id);
                $('amountInput').value = r.amount;
                $('dateInput').value = r.date;
                $('noteInput').value = r.note || '';
                selectedCat = r.category;
            } else {
                $('amountInput').value = '';
                $('dateInput').value = toISODate(viewDate);
                $('noteInput').value = '';
                selectedCat = 'food';
            }
            
            initCatGrid();
            modalOverlay.classList.add('open');
            setTimeout(() => $('amountInput').focus(), 300);
        }
        
        function closeModal() {
            modalOverlay.classList.remove('open');
            editingId = null;
        }

        // 保存数据
        function save() {
            localStorage.setItem('wx_records', JSON.stringify(records));
        }

        // 事件绑定
        $('addBtn').addEventListener('click', () => openModal());
        $('closeModal').addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', e => { if(e.target === modalOverlay) closeModal(); });
        
        $('prevDay').addEventListener('click', () => { viewDate.setDate(viewDate.getDate()-1); render(); });
        $('nextDay').addEventListener('click', () => { viewDate.setDate(viewDate.getDate()+1); render(); });
        $('todayBtn').addEventListener('click', () => { viewDate = new Date(); render(); });
        
        $('statsToggle').addEventListener('click', () => {
            statsPanel.classList.toggle('open');
            $('tabStats').classList.toggle('active');
            $('tabRecords').classList.toggle('active');
            if(statsPanel.classList.contains('open')) renderStats();
        });
        
        $('tabStats').addEventListener('click', () => {
            statsPanel.classList.add('open');
            $('tabStats').classList.add('active');
            $('tabRecords').classList.remove('active');
            renderStats();
        });
        $('tabRecords').addEventListener('click', () => {
            statsPanel.classList.remove('open');
            $('tabRecords').classList.add('active');
            $('tabStats').classList.remove('active');
        });

        $('submitBtn').addEventListener('click', () => {
            const amt = parseFloat($('amountInput').value);
            if (!amt || amt <= 0) { alert('请输入有效金额'); return; }
            
            const data = {
                id: editingId || Date.now(),
                amount: amt,
                category: selectedCat,
                date: $('dateInput').value,
                note: $('noteInput').value.trim()
            };
            
            if (editingId) {
                const idx = records.findIndex(r => r.id === editingId);
                if (idx !== -1) records[idx] = data;
            } else {
                records.push(data);
            }
            
            save();
            closeModal();
            render();
            renderStats();
        });

        // 启动
        initCatGrid();
        render();
        renderStats();
    </script>
</body>
</html>
